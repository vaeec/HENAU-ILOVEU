<script>
    (function() {
        var coreSocialistValues = ["明德", "自强", "求是", "力行", "弘农", "爱国", "求真", "创新", "厚德", "质朴", "包容", "奋进"]
          , index = Math.floor(Math.random() * coreSocialistValues.length);
        document.body.addEventListener('click', function(e) {
            if (e.target.tagName == 'A') {
                return;
            }
            var x = e.pageX
              , y = e.pageY
              , span = document.createElement('span');
            span.textContent = coreSocialistValues[index];
            index = (index + 1) % coreSocialistValues.length;//取模循环
            span.style.cssText = ['z-index: 9999999; position: absolute; font-weight: bold; color: #ffff00; top: ', y - 20, 'px; left: ', x, 'px;'].join('');
            document.body.appendChild(span);
            animate(span);
        });
        function animate(el) {//动画
            var i = 0
              , top = parseInt(el.style.top)
              , id = setInterval(frame, 24);
            function frame() {//帧
                if (i > 180) {
                    clearInterval(id);
                    el.parentNode.removeChild(el);
                } else {
                    i += 2;
                    el.style.top = top - i + 'px';
                    el.style.opacity = (180 - i) / 180;
                }
            }
        }
    }());
</script>
